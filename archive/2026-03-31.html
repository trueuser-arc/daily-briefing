  devtools: { label: "Dev Tools & Open Source", icon: "🛠" },
  startup: { label: "Startups & Indie", icon: "🚀" },
  tech: { label: "General Tech", icon: "📡" },
  hardware: { label: "Hardware", icon: "💻" },
  community: { label: "Community Intel", icon: "💬" }
};

let activeFilter = "all";
let searchQuery = "";

function render() {
  const el = document.getElementById("content");
  const filtered = ITEMS.filter(i => {
    if (activeFilter !== "all" && i.cat !== activeFilter) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return (i.title + i.analysis + i.source + i.catLabel).toLowerCase().includes(q);
    }
    return true;
  });

  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state">No stories match your filter.</div>';
    return;
  }

  const grouped = {};
  for (const item of filtered) {
    (grouped[item.cat] = grouped[item.cat] || []).push(item);
  }

  const order = ["ai","apple","security","devtools","startup","tech","hardware","community"];
  let html = "";
  for (const cat of order) {
    if (!grouped[cat]) continue;
    const c = CATEGORIES[cat];
    html += `<div class="category-section" data-cat="${cat}">
      <div class="category-header" onclick="toggleSection(this)">
        <h2>${c.icon} ${c.label} <span class="count">(${grouped[cat].length})</span></h2>
        <span class="chevron">▼</span>
      </div>
      <div class="items">`;
    for (const item of grouped[cat]) {
      html += `<div class="item">
        <div class="item-header">
          <h3><a href="${item.url}" target="_blank" rel="noopener">${item.title}</a></h3>
          <span class="tag tag-${item.cat}">${item.catLabel}</span>
        </div>
        <p>${item.analysis}</p>
        <div class="source">${item.source}</div>
      </div>`;
    }
    html += `</div></div>`;
  }
  el.innerHTML = html;
}

function toggleSection(header) {
  header.closest(".category-section").classList.toggle("collapsed");
}

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  render();
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById("item-count").textContent = ITEMS.length + " stories";
document.getElementById("last-updated").textContent = "Updated " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

render();
</script>
</body>
</html>
